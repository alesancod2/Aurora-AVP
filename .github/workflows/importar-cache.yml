name: Importar Cache Dashboard

on:
  schedule:
    # A cada hora, minuto 5 (evita concorrencia com outros jobs)
    - cron: '5 * * * *'
  workflow_dispatch:
    # Permite executar manualmente pelo GitHub

jobs:
  importar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Importar dados do mes atual
        env:
          AEASY_CPF: ${{ secrets.AEASY_CPF }}
          AEASY_SENHA: ${{ secrets.AEASY_SENHA }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 scripts/import_cron.py

      - name: Importar fluxo de caixa
        continue-on-error: true
        env:
          AEASY_CPF: ${{ secrets.AEASY_CPF }}
          AEASY_SENHA: ${{ secrets.AEASY_SENHA }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 scripts/import_fluxo.py
